<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGUS Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

<!-- ✅ YOUR REQUIRED SCRIPT (UNCHANGED) -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBhcnSQbSZxmCjGBRAZDVMyMfn1bGYZ_6Y" async defer></script>

<style>
body { margin:0; font-family:'DM Sans',sans-serif; }
#dashboard { display:none; height:100vh; }
#map { width:100%; height:100%; min-height:400px; }
#loginPage {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div>
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <div id="loginErr" style="color:red;"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div id="map"></div>
</div>

<script>
/* ================= GLOBALS ================= */
var map, infoWindow;
var deviceMarkers = {};
var API_URL = 'https://script.google.com/macros/s/AKfycbynsfU43pQB7ZnNnWRl4VDqLivyrcc66srnxxI7Mv64_MgmEfbBrg-zadecRgve6IBQ5A/exec';

/* ================= API ================= */
function apiGet(action) {
  return fetch(API_URL + '?action=' + action).then(r => r.json());
}

/* ================= LOGIN ================= */
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  if (!user || !pass) {
    document.getElementById('loginErr').innerText = 'Enter credentials';
    return;
  }

  // Demo login success
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  // ✅ Wait for Google Maps script, then init
  waitForGoogleMapsAndInit();

  // ✅ Fix hidden container rendering bug
  setTimeout(() => {
    if (map) {
      google.maps.event.trigger(map, 'resize');
      map.setCenter({ lat: 10.1129, lng: 123.6740 });
    }
  }, 700);
}

/* ================= WAIT FOR GOOGLE ================= */
function waitForGoogleMapsAndInit() {
  if (window.google && window.google.maps) {
    initGoogleMap();
  } else {
    setTimeout(waitForGoogleMapsAndInit, 300);
  }
}

/* ================= INIT MAP ================= */
function initGoogleMap() {
  if (!window.google || !google.maps) {
    console.error("Google Maps not loaded yet");
    return;
  }

  const center = { lat: 10.1129, lng: 123.6740 };

  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 12,
    center: center,
    mapTypeId: 'roadmap'
  });

  infoWindow = new google.maps.InfoWindow();

  // ✅ Force render fix
  setTimeout(() => {
    google.maps.event.trigger(map, 'resize');
    map.setCenter(center);
  }, 300);

  loadDevices();
}

/* ================= LOAD DEVICES ================= */
function loadDevices() {
  apiGet('getDashboardData')
    .then(devices => {
      updateMap(devices);
    })
    .catch(err => {
      console.error(err);
      alert("Failed to load device data");
    });
}

/* ================= UPDATE MAP ================= */
function updateMap(devices) {

  // Clear old markers
  Object.values(deviceMarkers).forEach(m => m.setMap(null));
  deviceMarkers = {};

  devices.forEach(d => {
    if (!d.latitude || !d.longitude) return;

    const pos = {
      lat: parseFloat(d.latitude),
      lng: parseFloat(d.longitude)
    };

    const marker = new google.maps.Marker({
      position: pos,
      map: map,
      title: d.device
    });

    marker.addListener('click', () => {
      infoWindow.setContent(
        `<b>${d.device}</b><br>
         Pressure: ${d.pressure || 0}<br>
         Level: ${d.level || 0}`
      );
      infoWindow.open(map, marker);
    });

    deviceMarkers[d.device] = marker;
  });
}

/* ================= GOOGLE MAP ERROR ================= */
window.gm_authFailure = function () {
  alert("Google Maps failed to load. Check API key or billing.");
};
</script>

</body>
</html>
